<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit 2.html Template</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 2rem; background:#f9f9f9;}
    label {display:block; margin-top:1rem; font-weight:bold;}
    textarea {width:100%; height:400px; font-family: monospace; margin-top:0.5rem;}
    button {margin-top:1rem; padding:0.6rem 1.2rem; font-size:1rem;}
    .msg {margin-top:1rem; color: green;}
  </style>
</head>
<body>
  <h1>Edit the Teacher‑Feedback Template (2.html)</h1>
  <label for="pwd">Password:</label>
  <input type="password" id="pwd" placeholder="Enter password" />

  <label for="content">HTML content:</label>
  <textarea id="content"></textarea>

  <button id="saveBtn">Save changes</button>
  <div class="msg" id="msg"></div>

  <script>
    const rawUrl = "https://raw.githubusercontent.com/vincecham91-png/J3K/main/2.html";
    // Load current file content
    fetch(rawUrl)
      .then(r => r.text())
      .then(txt => document.getElementById('content').value = txt)
      .catch(err => console.error('Failed to load 2.html', err));

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const pwd = document.getElementById('pwd').value.trim();
      const html = document.getElementById('content').value;
      if (!pwd) { alert('Please enter the password'); return; }
      const encoded = btoa(unescape(encodeURIComponent(html)));

        // ---- CALL Cloudflare Worker (token stored securely) ----
        const workerUrl = "https://<YOUR_WORKER_SUBDOMAIN>.workers.dev";
        const resp = await fetch(workerUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            ref: 'main',
            inputs: { password: pwd, content: encoded }
          })
        });
      const msgEl = document.getElementById('msg');
      if (resp.ok) {
        msgEl.style.color = 'green';
        msgEl.textContent = '✅ Changes submitted. The page will rebuild in a minute.';
      } else {
        const err = await resp.text();
        msgEl.style.color = 'red';
        msgEl.textContent = `❌ Failed: ${resp.status} – ${err}`;
      }
    });
  </script>
</body>
</html>
