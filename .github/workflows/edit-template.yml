name: Edit 2.html via web form

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Password to allow edit'
        required: true
      content:
        description: 'New content for 2.html (base64‑encoded)'
        required: true

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: Verify password
        if: ${{ inputs.password != secrets.EDITOR_PASSWORD }}
        run: |
          echo "Invalid password"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: false

      - name: Decode content
        run: |
          echo "${{ inputs.content }}" | base64 -d > 2.html

      - name: Commit and push changes
        env:
          GIT_AUTHOR_NAME: "GitHub Action"
          GIT_AUTHOR_EMAIL: "action@github.com"
          GIT_COMMITTER_NAME: "GitHub Action"
          GIT_COMMITTER_EMAIL: "action@github.com"
        run: |
          git add 2.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Edit 2.html via web form"
          git push origin HEAD:main
