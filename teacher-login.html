<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>华联中学 — 教师登录</title>
  <meta name="description" content="华联中学 Hua Lian High School 教师评语系统登录页">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --pico-primary:                  #1a56db;
      --pico-primary-background:       #1a56db;
      --pico-primary-hover:            #1e40af;
      --pico-primary-hover-background: #1e40af;
      --pico-border-radius:            10px;
    }

    body {
      min-height: 100vh;
      display:    flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f8fafc 100%);
      font-family: 'Segoe UI', Inter, Tahoma, sans-serif;
      padding: 1rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
    }

    article {
      border-radius: 16px !important;
      box-shadow: 0 8px 32px rgba(26,86,219,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 2.5rem 2rem;
    }

    .school-badge {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .school-badge .icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    .school-badge h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--pico-primary);
      margin: 0;
      line-height: 1.3;
    }
    .school-badge .subtitle {
      font-size: 0.82rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    .system-label {
      text-align: center;
      background: linear-gradient(135deg, #1a56db, #3b82f6);
      color: white;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.8rem;
      letter-spacing: 0.02em;
    }

    label { font-weight: 600; font-size: 0.9rem; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    footer.card-footer {
      text-align: center;
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
    }

    button[type="submit"] {
      width: 100%;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 1rem;
      padding: 0.75rem;
    }

    /* ── 下拉框增强 ──────────────────────────────── */
    select#username {
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      border: 2px solid #d1d5db;
      background: white;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    select#username:focus {
      border-color: var(--pico-primary);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.15);
      outline: none;
    }

    /* ── 科目快捷卡片网格 ────────────────────────── */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-top: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .subject-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      padding: 0.6rem 0.3rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      color: #374151;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 72px;
    }
    .subject-card:hover {
      border-color: var(--pico-primary);
      background: #f0f4ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26,86,219,0.12);
    }
    .subject-card:active {
      transform: scale(0.96);
    }
    .subject-card.selected {
      border-color: var(--pico-primary);
      background: linear-gradient(135deg, #eef2ff, #dbeafe);
      box-shadow: 0 0 0 2px rgba(26,86,219,0.25);
      color: var(--pico-primary);
      font-weight: 700;
    }

    /* 班主任卡片特殊强调 */
    .subject-card.form-teacher {
      border-color: #f59e0b;
      background: #fffbeb;
    }
    .subject-card.form-teacher:hover {
      border-color: #d97706;
      background: #fef3c7;
    }
    .subject-card.form-teacher.selected {
      border-color: #d97706;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      box-shadow: 0 0 0 2px rgba(217,119,6,0.3);
      color: #92400e;
    }

    .card-emoji {
      font-size: 1.4rem;
      line-height: 1;
    }
    .card-label {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.15;
    }
    .card-sub {
      font-size: 0.6rem;
      color: #9ca3af;
      line-height: 1;
      font-weight: 400;
    }
    .subject-card.selected .card-sub {
      color: inherit;
      opacity: 0.7;
    }

    /* 响应式：平板 3 列，手机 2 列 */
    @media (max-width: 480px) {
      .subject-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 0.4rem;
      }
      .subject-card {
        padding: 0.5rem 0.2rem;
        min-height: 64px;
      }
      .card-emoji { font-size: 1.2rem; }
      .card-label { font-size: 0.7rem; }
    }
    @media (max-width: 360px) {
      .subject-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <article>
      <div class="school-badge">
        <span class="icon">🏫</span>
        <h1>华联中学</h1>
        <div>Hua Lian High School</div>
        <div class="subtitle">J3K 初三仁 · 2026</div>
      </div>

      <div class="system-label">📋 教师评语系统 · Teacher Report System</div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" novalidate>
        <label for="username">选择身份 / Select Role</label>
        <select id="username" name="username" required>
          <option value="" disabled selected>-- 请选择身份 / Select Teacher --</option>
          <optgroup label="👨‍🏫 班主任 / Form Teacher">
            <option value="form_teacher">📋 班主任 / Form Teacher</option>
          </optgroup>
          <optgroup label="📚 科任老师 / Subject Teachers">
            <option value="math_t">📐 数学 / Mathematics</option>
            <option value="english_t">📖 英语 / English</option>
            <option value="malay_t">🗣️ 马来语 / Malay</option>
            <option value="chinese_t">📝 华语 / Chinese</option>
            <option value="history_t">🏛️ 历史 / History</option>
            <option value="geography_t">🌍 地理 / Geography</option>
            <option value="physic_t">⚛️ 物理 / Physics</option>
            <option value="chemistry_t">🧪 化学 / Chemistry</option>
            <option value="biology_t">🧬 生物 / Biology</option>
            <option value="art_t">🎨 美术 / Art</option>
            <option value="computer_t">💻 电脑 / Computer</option>
            <option value="robotics_t">🤖 机器人 / Robotics</option>
          </optgroup>
        </select>

        <!-- 科目快捷选择卡片 -->
        <div class="subject-grid" id="subjectGrid">
          <button type="button" class="subject-card form-teacher" data-value="form_teacher">
            <span class="card-emoji">📋</span>
            <span class="card-label">班主任</span>
            <span class="card-sub">Form Teacher</span>
          </button>
          <button type="button" class="subject-card" data-value="math_t">
            <span class="card-emoji">📐</span>
            <span class="card-label">数学</span>
            <span class="card-sub">Mathematics</span>
          </button>
          <button type="button" class="subject-card" data-value="english_t">
            <span class="card-emoji">📖</span>
            <span class="card-label">英语</span>
            <span class="card-sub">English</span>
          </button>
          <button type="button" class="subject-card" data-value="malay_t">
            <span class="card-emoji">🗣️</span>
            <span class="card-label">马来语</span>
            <span class="card-sub">Malay</span>
          </button>
          <button type="button" class="subject-card" data-value="chinese_t">
            <span class="card-emoji">📝</span>
            <span class="card-label">华语</span>
            <span class="card-sub">Chinese</span>
          </button>
          <button type="button" class="subject-card" data-value="history_t">
            <span class="card-emoji">🏛️</span>
            <span class="card-label">历史</span>
            <span class="card-sub">History</span>
          </button>
          <button type="button" class="subject-card" data-value="geography_t">
            <span class="card-emoji">🌍</span>
            <span class="card-label">地理</span>
            <span class="card-sub">Geography</span>
          </button>
          <button type="button" class="subject-card" data-value="physic_t">
            <span class="card-emoji">⚛️</span>
            <span class="card-label">物理</span>
            <span class="card-sub">Physics</span>
          </button>
          <button type="button" class="subject-card" data-value="chemistry_t">
            <span class="card-emoji">🧪</span>
            <span class="card-label">化学</span>
            <span class="card-sub">Chemistry</span>
          </button>
          <button type="button" class="subject-card" data-value="biology_t">
            <span class="card-emoji">🧬</span>
            <span class="card-label">生物</span>
            <span class="card-sub">Biology</span>
          </button>
          <button type="button" class="subject-card" data-value="art_t">
            <span class="card-emoji">🎨</span>
            <span class="card-label">美术</span>
            <span class="card-sub">Art</span>
          </button>
          <button type="button" class="subject-card" data-value="computer_t">
            <span class="card-emoji">💻</span>
            <span class="card-label">电脑</span>
            <span class="card-sub">Computer</span>
          </button>
          <button type="button" class="subject-card" data-value="robotics_t">
            <span class="card-emoji">🤖</span>
            <span class="card-label">机器人</span>
            <span class="card-sub">Robotics</span>
          </button>
        </div>

        <label for="password">密码 / Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="输入密码 / Enter password"
          autocomplete="current-password"
          required
        >

        <button type="submit" id="loginBtn">
          登录 / Login
        </button>
      </form>

      <footer class="card-footer">
        © 2026 华联中学 · Hua Lian High School<br>
        如忘记密码请联系班主任
      </footer>
    </article>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // If already logged in, redirect to report page
    if (getToken() && getUser()) {
      const u = getUser();
      window.location.href = u.role === 'form_teacher' ? 'form-teacher.html' : 'teacher-report.html';
    }

    const form      = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const selectEl  = document.getElementById('username');
    const cards     = document.querySelectorAll('.subject-card');

    // ── 卡片 ↔ 下拉框双向同步 ─────────────────────
    function syncCardsToSelect(value) {
      cards.forEach(c => c.classList.toggle('selected', c.dataset.value === value));
    }
    // 下拉框变化 → 同步卡片高亮
    selectEl.addEventListener('change', () => syncCardsToSelect(selectEl.value));
    // 点击卡片 → 同步下拉框
    cards.forEach(card => {
      card.addEventListener('click', () => {
        selectEl.value = card.dataset.value;
        syncCardsToSelect(card.dataset.value);
      });
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
    function hideError() {
      errorMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('请填写用户名和密码 / Please enter username and password');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span>登录中... / Logging in...';

      try {
        const data = await login(username, password);
        const user = data.teacher;

        if (user.role === 'form_teacher') {
          window.location.href = 'form-teacher.html';
        } else {
          window.location.href = 'teacher-report.html';
        }
      } catch (err) {
        showError(err.message || '登录失败，请检查用户名和密码 / Login failed');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '登录 / Login';
      }
    });
  </script>
</body>
</html>
